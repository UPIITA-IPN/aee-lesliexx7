name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: inverso_1
      id: inverso_1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: inverso_1
        setup-command: ''
        command: "./aee.sh "
        input: 3 26
        expected-output: '9'
        comparison-method: exact
        timeout: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        INVERSO_1_RESULTS: "${{steps.inverso_1.outputs.result}}"
      with:
        runners: inverso_1
